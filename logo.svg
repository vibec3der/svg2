<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml">
      <head>
        <style>
          body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #0d0814; color: white; }
          nav { padding: 15px; background: #1b0e2b; text-align: center; border-bottom: 2px solid #3b2159; }
          nav a { color: #c084fc; text-decoration: none; margin: 0 15px; font-weight: bold; letter-spacing: 0.1em; text-transform: uppercase; transition: 0.2s; }
          nav a:hover { color: #e9d5ff; text-shadow: 0 0 10px rgba(168, 85, 247, 0.8); }
          #app-container { padding: 20px; display: flex; justify-content: center; }
        </style>
        
        <script src="https://cdn.jsdelivr.net/gh/vibec3der/svg2/app.js" defer="defer"></script>
      </head>
      <body>
        <nav>
          <a href="#home">Home</a>
          <a href="#games">Games Hub</a>
        </nav>
        
        <div id="app-container">Establishing connection...</div>
      </body>
    </html>
  </foreignObject>
</svg>
